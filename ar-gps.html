<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ChronoView — Mode GPS</title>

  <!-- A-Frame + AR.js (GPS + Marker support) -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; font-family: Georgia, serif; background: #000; }

    /* ──── LOADING ──── */
    #loading {
      position: fixed; inset: 0;
      background: #080604;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999;
      transition: opacity .6s ease;
    }
    #loading.out { opacity: 0; pointer-events: none; }
    .ll { font-size: 32px; color: #c8a84b; letter-spacing: .1em; margin-bottom: 8px; }
    .ls { font-size: 11px; letter-spacing: .3em; text-transform: uppercase; color: #a89870; margin-bottom: 30px; }
    .lb { width: 160px; height: 1px; background: rgba(200,168,75,.2); overflow: hidden; }
    .lb::after {
      content: ''; display: block; height: 1px; width: 50%;
      background: #c8a84b;
      animation: sweep 1.4s ease infinite;
    }
    @keyframes sweep { from { transform: translateX(-120%); } to { transform: translateX(280%); } }

    /* ──── TOP BAR ──── */
    #topbar {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100;
      background: linear-gradient(to bottom, rgba(0,0,0,.88), transparent);
      padding: 16px 18px 50px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .back {
      display: flex; align-items: center; gap: 6px;
      background: rgba(200,168,75,.12);
      border: 1px solid rgba(200,168,75,.35);
      color: #e8c96e;
      padding: 8px 14px;
      font-size: 13px; letter-spacing: .08em;
      text-decoration: none; border-radius: 2px;
    }
    .mbadge {
      background: rgba(200,168,75,.1);
      border: 1px solid rgba(200,168,75,.28);
      color: #e8c96e;
      padding: 6px 12px;
      font-size: 11px; letter-spacing: .2em; text-transform: uppercase;
      border-radius: 2px;
    }

    /* ──── GPS STATUS PILL ──── */
    #gps-pill {
      position: fixed; top: 76px; left: 50%; transform: translateX(-50%);
      z-index: 100;
      background: rgba(0,0,0,.72);
      border: 1px solid rgba(200,168,75,.28);
      padding: 7px 18px; border-radius: 20px;
      font-size: 12px; letter-spacing: .1em; color: #a89870;
      white-space: nowrap;
      transition: opacity .5s;
    }
    #gps-pill.fade { opacity: 0; }

    /* ──── PHOTO OVERLAY (premium) ──── */
    #photo-overlay {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.92);
      z-index: 100;
      width: min(88vw, 420px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .5s ease, transform .5s ease;
    }
    #photo-overlay.visible {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
      pointer-events: all;
    }

    /* Cadre doré */
    .photo-frame {
      position: relative;
      border: 1px solid rgba(200,168,75,.55);
      box-shadow: 0 0 40px rgba(0,0,0,.7), inset 0 0 0 4px rgba(200,168,75,.08);
      background: #050400;
    }
    .photo-frame::before, .photo-frame::after,
    .corner-br::before, .corner-br::after {
      content: ''; position: absolute;
      width: 18px; height: 18px;
      border-color: #c8a84b; border-style: solid;
    }
    .photo-frame::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .photo-frame::after  { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
    .corner-br { position: absolute; inset: 0; pointer-events: none; }
    .corner-br::before { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
    .corner-br::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    /* Année en haut */
    .photo-year {
      text-align: center;
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 28px; letter-spacing: .1em;
      color: #c8a84b;
      padding: 12px 0 8px;
      border-bottom: 1px solid rgba(200,168,75,.2);
      background: rgba(8,6,4,.85);
    }

    /* Image */
    #ar-img-overlay {
      display: block;
      width: 100%; aspect-ratio: 4/3;
      object-fit: cover;
    }

    /* Légende */
    .photo-caption {
      text-align: center;
      font-size: 13px; letter-spacing: .12em;
      color: #a89870;
      padding: 10px 16px 12px;
      background: rgba(8,6,4,.85);
      border-top: 1px solid rgba(200,168,75,.2);
    }

    /* Boutons navigation */
    .photo-nav {
      display: flex; gap: 1px; margin-top: 1px;
    }
    .nav-btn {
      flex: 1; padding: 13px 8px;
      background: rgba(8,6,4,.9);
      border: none; border-top: 1px solid rgba(200,168,75,.18);
      color: #e8c96e; font-size: 12px; letter-spacing: .08em;
      cursor: pointer;
      transition: background .2s;
    }
    .nav-btn:first-child { border-right: 1px solid rgba(200,168,75,.18); }
    .nav-btn:last-child  { border-left: 1px solid rgba(200,168,75,.18); }
    .nav-btn:active { background: rgba(200,168,75,.15); }
    .nav-btn.primary {
      background: rgba(200,168,75,.1);
      color: #c8a84b;
    }

    /* ──── BOTTOM INFO ──── */
    #infocard {
      position: fixed; bottom: 0; left: 0; right: 0;
      z-index: 200;
      background: linear-gradient(to top, rgba(0,0,0,.92) 60%, transparent);
      padding: 40px 22px 30px;
    }
    .loc-tag { font-size: 10px; letter-spacing: .28em; text-transform: uppercase; color: #c8a84b; margin-bottom: 3px; }
    .loc-name { font-size: 18px; color: #f0e6c8; margin-bottom: 6px; }
    .dist-row { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; color: #a89870; }
    .pulse { width: 7px; height: 7px; border-radius: 50%; background: #c8a84b; animation: pulseAnim 1.8s ease infinite; }
    @keyframes pulseAnim { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.4;transform:scale(.75);} }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .chip { background: rgba(200,168,75,.09); border: 1px solid rgba(200,168,75,.22); color: #f0e6c8; padding: 3px 10px; font-size: 11px; border-radius: 2px; }

    /* A-Frame full screen */
    a-scene { display: block !important; width: 100vw !important; height: 100vh !important; }
  </style>
</head>
<body>

<!-- Loading overlay -->
<div id="loading">
  <div class="ll">CHRONO·VIEW</div>
  <div class="ls">Activation GPS & Caméra</div>
  <div class="lb"></div>
</div>

<!-- GPS status -->
<div id="gps-pill">Localisation en cours…</div>

<!-- Top bar -->
<div id="topbar">
  <a href="index.html" class="back">← Retour</a>
  <div class="mbadge">Mode GPS</div>
</div>

<!-- Photo overlay premium (centré sur l'écran) -->
<div id="photo-overlay">
  <div class="photo-frame">
    <div class="corner-br"></div>
    <div class="photo-year" id="overlay-year">1905</div>
    <img id="ar-img-overlay" src="https://picsum.photos/seed/pont1905/800/600" alt="">
    <div class="photo-caption" id="overlay-caption">Vue d'époque du pont</div>
    <div class="photo-nav">
      <button class="nav-btn" onclick="prevPhoto()">← Préc.</button>
      <button class="nav-btn primary" id="vid-btn" onclick="toggleVideo()">Vidéo</button>
      <button class="nav-btn" onclick="nextPhoto()">Suiv. →</button>
    </div>
  </div>
</div>

<!-- Bottom info card -->
<div id="infocard">
  <div class="loc-tag">Lieu Historique</div>
  <div class="loc-name" id="loc-name">Chargement…</div>
  <div class="dist-row">
    <div class="pulse"></div>
    <span id="dist-text">Calcul de la distance…</span>
  </div>
  <div class="chips" id="chips"></div>
</div>

<!-- ════════════════════════════════════════
     A-FRAME AR SCENE — GPS MODE
     Modifiez latitude/longitude ci-dessous
     ════════════════════════════════════════ -->
<a-scene
  vr-mode-ui="enabled: false"
  arjs="sourceType: webcam; debugUIEnabled: false; videoTexture: false;"
  renderer="antialias: true; alpha: true; logarithmicDepthBuffer: true;"
  embedded>

  <a-assets>
    <!-- Remplacez ces URLs par vos vraies photos historiques -->
    <img id="p0" crossorigin="anonymous" src="https://picsum.photos/seed/pont1905/800/600">
    <img id="p1" crossorigin="anonymous" src="https://picsum.photos/seed/pont1940/800/600">
    <img id="p2" crossorigin="anonymous" src="https://picsum.photos/seed/pont1975/800/600">
    <img id="p3" crossorigin="anonymous" src="https://picsum.photos/seed/pont2000/800/600">
    <!-- Remplacez par votre vraie vidéo d'archive -->
    <video id="vid" autoplay loop muted playsinline crossorigin="anonymous"
           src="https://www.w3schools.com/html/mov_bbb.mp4"></video>
  </a-assets>

  <!--
    ╔══════════════════════════════════╗
    ║  MODIFIEZ CES COORDONNÉES GPS   ║
    ║  → latitude  : votre lieu       ║
    ║  → longitude : votre lieu       ║
    ╚══════════════════════════════════╝
  -->
  <a-entity id="landmark-entity"
    gps-entity-place="latitude: 47.495705; longitude: 6.804361;">

    <!-- Marqueur au sol (sphère dorée flottante) -->
    <a-sphere
      position="0 1.5 0" radius="0.25"
      material="color: #c8a84b; shader: flat; transparent: true; opacity: 0.9;"
      animation="property: position; from: 0 1.2 0; to: 0 1.8 0;
                 dur: 2200; easing: easeInOutSine; loop: true; dir: alternate;">
    </a-sphere>

    <!-- Marqueur visuel 3D (point de repère dans l'espace) -->
    <a-text
      value="▼"
      position="0 3 0"
      align="center"
      color="#c8a84b"
      width="6"
      look-at="[gps-camera]">
    </a-text>

  </a-entity>

  <!-- Caméra GPS -->
  <a-camera gps-camera="simulateAltitude: 0; positionMinAccuracy: 100; minDistance: 1" rotation-reader></a-camera>
</a-scene>

<script>
// ═══════════════════════════════════════════════════
//    CONFIGURATION — Modifiez ici vos données
// ═══════════════════════════════════════════════════
const CONFIG = {
  landmark: {
    name: "Test Maison",
    lat: 47.495705,
    lng: 6.804361,
    radius: 100,   // mètres — AR visible dans ce rayon
  },
  stats: ["Construit en 1749", "48 mètres", "Monument historique", "25 000 véh/jour"],
  photos: [
    { id:"#p0", year:"1905", caption:"Vue d'époque du pont" },
    { id:"#p1", year:"1940", caption:"Le pont durant la guerre" },
    { id:"#p2", year:"1975", caption:"Rénovation des années 70" },
    { id:"#p3", year:"2000", caption:"Entrée dans le millénaire" },
  ]
};
// ═══════════════════════════════════════════════════

let photoIdx = 0;
let videoVisible = false;

// Init UI
document.getElementById('loc-name').textContent = CONFIG.landmark.name;
const chipsEl = document.getElementById('chips');
CONFIG.stats.forEach(s => {
  const c = document.createElement('div');
  c.className = 'chip'; c.textContent = s;
  chipsEl.appendChild(c);
});

function updateOverlay() {
  const p = CONFIG.photos[photoIdx];
  document.getElementById('ar-img-overlay').src = p.id.replace('#','') === p.id ? p.id : document.querySelector(p.id).src;
  document.getElementById('overlay-year').textContent = p.year;
  document.getElementById('overlay-caption').textContent = p.caption;
}
// init overlay avec vraie src
function initOverlay() {
  const p = CONFIG.photos[0];
  document.getElementById('ar-img-overlay').src = document.querySelector(p.id).src;
}

// Haversine distance (meters)
function dist(lat1, lng1, lat2, lng2) {
  const R = 6371000, r = Math.PI/180;
  const dLat = (lat2-lat1)*r, dLng = (lng2-lng1)*r;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*r)*Math.cos(lat2*r)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function fmtDist(m) {
  return m < 1000 ? `${Math.round(m)} m du lieu` : `${(m/1000).toFixed(1)} km du lieu`;
}

// GPS watch
if (navigator.geolocation) {
  navigator.geolocation.watchPosition(pos => {
    const d = dist(pos.coords.latitude, pos.coords.longitude, CONFIG.landmark.lat, CONFIG.landmark.lng);
    const inZone = d <= CONFIG.landmark.radius;

    // Affichage distance
    document.getElementById('dist-text').textContent = inZone
      ? `Dans la zone AR — ${Math.round(d)} m`
      : fmtDist(d) + ` (zone AR : ${CONFIG.landmark.radius} m)`;

    // Couleur zone
    document.getElementById('dist-text').style.color = inZone ? '#c8a84b' : '';

    // Afficher/cacher l'overlay photo
    const overlay = document.getElementById('photo-overlay');
    if (inZone) overlay.classList.add('visible');
    else overlay.classList.remove('visible');

    const pill = document.getElementById('gps-pill');
    pill.textContent = `GPS actif · ±${Math.round(pos.coords.accuracy)} m`;
    pill.classList.remove('fade');
    setTimeout(() => pill.classList.add('fade'), 4000);
  }, err => {
    const msg = err.code === 1 ? 'GPS refusé dans Safari' : 'Erreur GPS';
    document.getElementById('gps-pill').textContent = msg;
    document.getElementById('dist-text').textContent = 'GPS indisponible';
  }, { enableHighAccuracy: true, maximumAge: 5000 });
} else {
  document.getElementById('gps-pill').textContent = 'GPS non supporté';
}

function updateAR() {
  const p = CONFIG.photos[photoIdx];
  document.getElementById('ar-img-overlay').src = document.querySelector(p.id).src;
  document.getElementById('overlay-year').textContent = p.year;
  document.getElementById('overlay-caption').textContent = p.caption;
}

function nextPhoto() {
  if (videoVisible) toggleVideo();
  photoIdx = (photoIdx + 1) % CONFIG.photos.length;
  updateAR();
}

function prevPhoto() {
  if (videoVisible) toggleVideo();
  photoIdx = (photoIdx - 1 + CONFIG.photos.length) % CONFIG.photos.length;
  updateAR();
}

function toggleVideo() {
  videoVisible = !videoVisible;
  const imgEl = document.getElementById('ar-img-overlay');
  const vidEl = document.querySelector('#vid');
  const btn   = document.getElementById('vid-btn');
  if (videoVisible) {
    imgEl.style.display = 'none';
    // Remplace l'img par une video dans le frame
    let vTag = document.getElementById('overlay-vid');
    if (!vTag) {
      vTag = document.createElement('video');
      vTag.id = 'overlay-vid';
      vTag.autoplay = true; vTag.loop = true; vTag.muted = true; vTag.playsInline = true;
      vTag.src = vidEl.src;
      vTag.style.cssText = 'display:block;width:100%;aspect-ratio:4/3;object-fit:cover;';
      imgEl.parentNode.insertBefore(vTag, imgEl.nextSibling);
    }
    vTag.style.display = 'block';
    vTag.play();
    document.getElementById('overlay-year').textContent = 'Archives';
    document.getElementById('overlay-caption').textContent = 'Vidéo d\'archive — 1968';
    btn.textContent = 'Photos';
  } else {
    const vTag = document.getElementById('overlay-vid');
    if (vTag) vTag.style.display = 'none';
    imgEl.style.display = 'block';
    btn.textContent = 'Vidéo';
    updateAR();
  }
}

// Auto-cycle photos every 7s
setInterval(() => { if (!videoVisible) nextPhoto(); }, 7000);

// Remove loading on scene ready
document.querySelector('a-scene').addEventListener('loaded', () => {
  setTimeout(() => {
    document.getElementById('loading').classList.add('out');
    initOverlay();
  }, 1400);
});
</script>
</body>
</html>
