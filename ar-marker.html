<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ChronoView — Mode Marqueur</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; font-family: 'Cormorant Garamond', Georgia, serif; background: #000; }

    /* ──── LOADING ──── */
    #loading {
      position: fixed; inset: 0; background: #080604;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; transition: opacity .6s;
    }
    #loading.out { opacity: 0; pointer-events: none; }
    .ll { font-size: 30px; color: #c8a84b; letter-spacing: .1em; margin-bottom: 8px; }
    .ls { font-size: 11px; letter-spacing: .3em; text-transform: uppercase; color: #a89870; margin-bottom: 28px; }
    .lb { width: 150px; height: 1px; background: rgba(200,168,75,.2); overflow: hidden; }
    .lb::after {
      content: ''; display: block; height: 1px; width: 50%;
      background: #c8a84b; animation: sweep 1.4s ease infinite;
    }
    @keyframes sweep { from { transform: translateX(-120%); } to { transform: translateX(280%); } }

    /* ──── TOP BAR ──── */
    #topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      background: linear-gradient(to bottom, rgba(0,0,0,.88), transparent);
      padding: 16px 18px 50px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .back {
      display: flex; align-items: center; gap: 6px;
      background: rgba(200,168,75,.12); border: 1px solid rgba(200,168,75,.35);
      color: #e8c96e; padding: 8px 14px; font-size: 13px;
      text-decoration: none; border-radius: 2px; letter-spacing: .08em;
    }
    .mbadge {
      background: rgba(200,168,75,.1); border: 1px solid rgba(200,168,75,.28);
      color: #e8c96e; padding: 6px 12px; font-size: 11px;
      letter-spacing: .2em; text-transform: uppercase; border-radius: 2px;
    }

    /* ──── SCAN HINT ──── */
    #scan-hint {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      z-index: 150; text-align: center; pointer-events: none;
      transition: opacity .4s;
    }
    #scan-hint.hidden { opacity: 0; }

    .scan-frame {
      width: 170px; height: 170px; margin: 0 auto 22px; position: relative;
    }
    .scan-frame::before, .scan-frame::after,
    .scan-c2::before, .scan-c2::after {
      content: ''; position: absolute; width: 28px; height: 28px;
      border-color: #c8a84b; border-style: solid;
    }
    .scan-frame::before { top: 0; left: 0; border-width: 2px 0 0 2px; }
    .scan-frame::after  { top: 0; right: 0; border-width: 2px 2px 0 0; }
    .scan-c2 { position: absolute; inset: 0; }
    .scan-c2::before { bottom: 0; left: 0; border-width: 0 0 2px 2px; }
    .scan-c2::after  { bottom: 0; right: 0; border-width: 0 2px 2px 0; }
    .scan-line {
      position: absolute; top: 0; left: 6px; right: 6px; height: 2px;
      background: linear-gradient(to right, transparent, #c8a84b 50%, transparent);
      animation: scanLine 2.2s ease infinite;
    }
    @keyframes scanLine { 0% { top: 4px; opacity: 1; } 100% { top: 164px; opacity: 0; } }
    .scan-label { font-size: 15px; letter-spacing: .18em; text-transform: uppercase; color: #f0e6c8; text-shadow: 0 0 20px rgba(0,0,0,.8); }
    .scan-sub   { font-size: 12px; color: #a89870; margin-top: 7px; letter-spacing: .12em; }

    /* ──── PHOTO OVERLAY (premium) ──── */
    #photo-overlay {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.92);
      z-index: 100;
      width: min(88vw, 420px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .4s ease, transform .4s ease;
    }
    #photo-overlay.visible {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
      pointer-events: all;
    }

    /* Cadre doré */
    .photo-frame {
      position: relative;
      border: 1px solid rgba(200,168,75,.55);
      box-shadow: 0 0 40px rgba(0,0,0,.7), inset 0 0 0 4px rgba(200,168,75,.08);
      background: #050400;
    }
    .photo-frame::before, .photo-frame::after,
    .corner-br::before, .corner-br::after {
      content: ''; position: absolute;
      width: 18px; height: 18px;
      border-color: #c8a84b; border-style: solid;
    }
    .photo-frame::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .photo-frame::after  { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
    .corner-br { position: absolute; inset: 0; pointer-events: none; }
    .corner-br::before { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
    .corner-br::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    /* Année */
    .photo-year {
      text-align: center;
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 28px; letter-spacing: .1em;
      color: #c8a84b;
      padding: 12px 0 8px;
      border-bottom: 1px solid rgba(200,168,75,.2);
      background: rgba(8,6,4,.85);
    }

    /* Image */
    #ar-img-overlay {
      display: block;
      width: 100%; aspect-ratio: 4/3;
      object-fit: cover;
    }

    /* Légende */
    .photo-caption {
      text-align: center;
      font-size: 13px; letter-spacing: .12em;
      color: #a89870;
      padding: 10px 16px 12px;
      background: rgba(8,6,4,.85);
      border-top: 1px solid rgba(200,168,75,.2);
    }

    /* Dots */
    .photo-dots {
      display: flex; justify-content: center; gap: 7px;
      padding: 8px 0 10px;
      background: rgba(8,6,4,.85);
      border-top: 1px solid rgba(200,168,75,.1);
    }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(200,168,75,.25);
      transition: background .3s, transform .3s;
    }
    .dot.on { background: #c8a84b; transform: scale(1.3); }

    /* Boutons */
    .photo-nav {
      display: flex; gap: 1px; margin-top: 1px;
    }
    .nav-btn {
      flex: 1; padding: 13px 8px;
      background: rgba(8,6,4,.9);
      border: none; border-top: 1px solid rgba(200,168,75,.18);
      color: #e8c96e; font-size: 12px; letter-spacing: .08em;
      cursor: pointer; transition: background .2s;
    }
    .nav-btn:first-child { border-right: 1px solid rgba(200,168,75,.18); }
    .nav-btn:last-child  { border-left: 1px solid rgba(200,168,75,.18); }
    .nav-btn:active { background: rgba(200,168,75,.15); }
    .nav-btn.primary { background: rgba(200,168,75,.1); color: #c8a84b; }

    a-scene { display: block !important; width: 100vw !important; height: 100vh !important; }

    /* ──── ÉCRAN DE BIENVENUE PSM ──── */
    #welcome {
      position: fixed; inset: 0; background: #080604;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 99999; transition: opacity .8s ease;
    }
    #welcome.out { opacity: 0; pointer-events: none; }
    #welcome img {
      width: 180px; margin-bottom: 28px;
      animation: welcomeFade 1s ease forwards;
    }
    @keyframes welcomeFade { from { opacity: 0; transform: scale(.9); } to { opacity: 1; transform: scale(1); } }
    .wt { font-size: 22px; color: #c8a84b; letter-spacing: .15em; text-align: center; margin-bottom: 10px; }
    .ws { font-size: 13px; color: #a89870; letter-spacing: .25em; text-transform: uppercase; text-align: center; }
    .wline { width: 60px; height: 1px; background: rgba(200,168,75,.4); margin: 18px auto 0; }
  </style>
</head>
<body>

<!-- Écran de bienvenue PSM -->
<div id="welcome">
  <img src="image_campus/logo_psm.jpg" alt="Logo PSM">
  <div class="wt">Bienvenue au Master PSM</div>
  <div class="ws">Produits &amp; Services Multimédia</div>
  <div class="wline"></div>
</div>

<!-- Loading -->
<div id="loading">
  <div class="ll">CHRONO·VIEW</div>
  <div class="ls">Activation de la caméra</div>
  <div class="lb"></div>
</div>

<!-- Top bar -->
<div id="topbar">
  <a href="index.html" class="back">← Retour</a>
  <div class="mbadge">Mode Marqueur</div>
</div>

<!-- Scan hint -->
<div id="scan-hint">
  <div class="scan-frame">
    <div class="scan-c2"></div>
    <div class="scan-line"></div>
  </div>
  <div class="scan-label">Pointez le marqueur Hiro</div>
  <div class="scan-sub">Maintenez la caméra stable</div>
</div>

<!-- Photo overlay premium -->
<div id="photo-overlay">
  <div class="photo-frame">
    <div class="corner-br"></div>
    <div class="photo-year" id="overlay-year">1905</div>
    <img id="ar-img-overlay" src="" alt="">
    <div class="photo-caption" id="overlay-caption">Vue d'époque du pont</div>
    <div class="photo-dots" id="dots"></div>
    <div class="photo-nav">
      <button class="nav-btn" onclick="prevPhoto()">← Préc.</button>
      <button class="nav-btn primary" id="vid-btn" onclick="toggleVideo()">Vidéo</button>
      <button class="nav-btn" onclick="nextPhoto()">Suiv. →</button>
    </div>
  </div>
</div>

<!-- A-Frame : caméra + détection marqueur uniquement -->
<a-scene
  vr-mode-ui="enabled: false"
  arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
  renderer="antialias: true; alpha: true;"
  embedded>

  <a-assets>
    <img id="p0" src="image_campus/fin_etude2026.jpeg">
    <img id="p1" src="image_campus/fin_etude2026_1.jpeg">
    <img id="p2" src="image_campus/fin_etude_2.jpeg">
    <img id="p3" src="image_campus/fin_etude_3.jpeg">
    <img id="p4" src="image_campus/remuse_diplome1.jpeg">
    <img id="p5" src="image_campus/remuse_diplome2.jpeg">
    <img id="p6" src="image_campus/reunion.jpeg">
    <video id="vid" loop muted playsinline crossorigin="anonymous"
           src="https://www.w3schools.com/html/mov_bbb.mp4"></video>
  </a-assets>

  <!-- Marqueur Hiro : juste une sphère dorée pour indiquer la détection -->
  <a-marker preset="hiro" id="marker">
    <a-sphere
      position="0 0.3 0" radius="0.15"
      material="color: #c8a84b; shader: flat; transparent: true; opacity: 0.7;"
      animation="property: position; from: 0 0.2 0; to: 0 0.4 0;
                 dur: 1800; easing: easeInOutSine; loop: true; dir: alternate;">
    </a-sphere>
  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

<script>
// ──── Écran de bienvenue : disparaît après 3 secondes ────
setTimeout(() => {
  const w = document.getElementById('welcome');
  w.classList.add('out');
  setTimeout(() => w.remove(), 900);
}, 3000);

// ═══════════════════════════════════════════════════
//    CONFIGURATION — Modifiez ici vos données
// ═══════════════════════════════════════════════════
const PHOTOS = [
  { id:'#p0', year:'2026', cap:"Soutenance publique des projets de fin d'études — Master 2 Produits & Services Multimédia, UFR STGI · Université Marie et Louis Pasteur" },
  { id:'#p1', year:'2026', cap:"Présentés au showroom de SEM NUMERICA, 10 projets innovants autour des services multimédia ont été mis à l'honneur" },
  { id:'#p2', year:'2026', cap:"IA, XR, IoT, SaaS… Des solutions concrètes : Guardify, RoadEye, OptiStock, Air Quality, Campus 3D, RAPIDO et bien d'autres" },
  { id:'#p3', year:'2026', cap:"Des mois de travail qui marquent la fin du parcours universitaire — et le début d'une aventure professionnelle pour nos étudiants" },
  { id:'#p4', year:'2025', cap:"Remise des diplômes — Master PSM · Jeudi 4 septembre, l'UFR STGI célèbre la promotion 2025" },
  { id:'#p5', year:'2025', cap:"Fierté et convivialité pour féliciter nos étudiants qui clôturent deux années d'efforts et de projets enrichissants" },
  { id:'#p6', year:'2025', cap:"Bravo à la promotion 2025 ! Nous vous souhaitons un bel avenir professionnel, riche en opportunités et en réussites" },
];
const VIDEO_YEAR    = '1968';
const VIDEO_CAPTION = 'Archives cinématographiques';
// ═══════════════════════════════════════════════════

let idx = 0;
let videoMode = false;

// Build dots
const dotsEl = document.getElementById('dots');
PHOTOS.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'dot' + (i===0 ? ' on' : '');
  d.id = 'dot' + i;
  dotsEl.appendChild(d);
});

function refreshUI() {
  const p = PHOTOS[idx];
  document.getElementById('ar-img-overlay').src = document.querySelector(p.id).src;
  document.getElementById('overlay-year').textContent = p.year;
  document.getElementById('overlay-caption').textContent = p.cap;
  PHOTOS.forEach((_, i) => {
    document.getElementById('dot'+i).className = 'dot' + (i===idx ? ' on' : '');
  });
}

function nextPhoto() {
  if (videoMode) { toggleVideo(); return; }
  idx = (idx + 1) % PHOTOS.length;
  refreshUI();
}

function prevPhoto() {
  if (videoMode) { toggleVideo(); return; }
  idx = (idx - 1 + PHOTOS.length) % PHOTOS.length;
  refreshUI();
}

function toggleVideo() {
  videoMode = !videoMode;
  const imgEl = document.getElementById('ar-img-overlay');
  const btn   = document.getElementById('vid-btn');
  if (videoMode) {
    imgEl.style.display = 'none';
    let vTag = document.getElementById('overlay-vid');
    if (!vTag) {
      vTag = document.createElement('video');
      vTag.id = 'overlay-vid';
      vTag.autoplay = true; vTag.loop = true; vTag.muted = true; vTag.playsInline = true;
      vTag.src = document.querySelector('#vid').src;
      vTag.style.cssText = 'display:block;width:100%;aspect-ratio:4/3;object-fit:cover;';
      imgEl.parentNode.insertBefore(vTag, imgEl.nextSibling);
    }
    vTag.style.display = 'block';
    vTag.play();
    document.getElementById('overlay-year').textContent = VIDEO_YEAR;
    document.getElementById('overlay-caption').textContent = VIDEO_CAPTION;
    btn.textContent = 'Photos';
  } else {
    const vTag = document.getElementById('overlay-vid');
    if (vTag) vTag.style.display = 'none';
    imgEl.style.display = 'block';
    btn.textContent = 'Vidéo';
    refreshUI();
  }
}

// Marker detection → affiche/cache l'overlay
const marker = document.querySelector('#marker');
marker.addEventListener('markerFound', () => {
  document.getElementById('scan-hint').classList.add('hidden');
  document.getElementById('photo-overlay').classList.add('visible');
});
marker.addEventListener('markerLost', () => {
  document.getElementById('scan-hint').classList.remove('hidden');
  document.getElementById('photo-overlay').classList.remove('visible');
});

// Init après chargement
document.querySelector('a-scene').addEventListener('loaded', () => {
  setTimeout(() => {
    document.getElementById('loading').classList.add('out');
    refreshUI();
  }, 1500);
});
</script>
</body>
</html>
